<!-- !--==== HTML SCRIPT ===== -->
<html lang = "en">
    <!-- === Head Section ====  -->
    <head>
        <!-- === Include Special Character, Get out of ASCII default -->
        <meta charset="UTF-8">
        <!-- === Title ==== -->
        <title id="title">Teams Login page</title>
        <meta name="description" content="This is the login page " />
        <meta name="robots" content="noindex nofollow"/>   <!-- Do not want page or any of its links to be indexed-->
        <meta http-equiv="author" content="Emiliano Perez Pellicer"/> <!-- Want browser to reload this page every time -->
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <link href="/css/theme.css" rel="stylesheet"/>
        <link href="/css/style.css" rel="stylesheet"/>
        <link href="/css/components/top-bar-style.css" rel="stylesheet"/>
    </head>
    <!-- ===Body Section ===  -->
    <body class="d-flex flex-column min-vh-100">
        <header>
            <div id="topbar"></div>
        </header>

        <main class="flex-grow-1">
            <div class="container">
                <section class="title">
                    <h1>Login</h1>
                    <h2>To access the elevator</h2>
                </section>
    
                <section class="login">
                    <div>
                        <form action="/php/authorization/login.php" method="POST">
                            <!-- Add Username  -->
                            <p>Username: 
                                <input type="text" id="username" name="username" required/>
                            </p>
                            <!-- Add Password -->
                            <p>Password:
                                <input type="password" id="password" name="password" required/>
                            </p>
        
                            <p id="errorMessage"></p>
        
                            <!-- Generate Log in button -->
                            <input type="submit" value="Log in"/>
                            <p><a href="/html/authorization/request-access.html">Request Access</a></p> 
                        </form>

                        <p>Username: seantoet Password: seantoet</p>
                    </div>
                </section>
            </div>
        </main>

        <footer>
            <copyright-text name="Emiliano Perez Pellicer"></copyright-text>
        </footer>

        <script>
            const username = document.getElementById("username");
            const password = document.getElementById("password");

            username.addEventListener("input", (event) => {
                if (username.value.length < 7) {
                    document.getElementById("errorMessage").textContent = "Username must be more then 6 characters";
                } else {
                    document.getElementById("errorMessage").textContent = "";
                }
            })
            password.addEventListener("input", (event) => {
                if (password.value.length < 7) {
                    document.getElementById("errorMessage").textContent = "Password must be more then 6 characters";
                } else {
                    document.getElementById("errorMessage").textContent = "";
                }
            })

            document.addEventListener("DOMContentLoaded", () => {
                if (username) {
                    username.focus();
                }
            })
        </script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/js/components/top-bar.js"></script>
    </body>
</html>
