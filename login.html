<!-- !--==== HTML SCRIPT ===== -->
<html lang = "en">
    <!-- === Head Section ====  -->
    <head>
        <!-- === Include Special Character, Get out of ASCII default -->
        <meta charset="UTF-8">
        <!-- === Title ==== -->
        <title id="title">Teams Login page</title>
        <meta name="description" content="This is the login page " />
        <meta name="robots" content="noindex nofollow"/>   <!-- Do not want page or any of its links to be indexed-->
        <meta http-equiv="author" content="Emiliano Perez Pellicer"/> <!-- Want browser to reload this page every time -->
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
    </head>
    <!-- ===Body Section ===  -->
    <body>
        <h1>Please Log In</h1>
        <form action="php/login.php" method="post" id="login">
            <!-- Add Username  -->
            <p>Username: 
                <input type="text" id="username" name="username"/>
            </p>
            <!-- Add Password -->
            <p>Password:
                <input type="password" id="password" name="password"/>
            </p>

            <p id="errorMessage"></p>

            <!-- Generate Log in button -->
            <input type="submit" value="Log in"/>
            <p><a href="./access/request_access.html">Request Access</a></p> 
        </form>

        <footer>
            <!-- Add Copy Right  -->
            <p id = "copyright">Copyright &copy Emiliano Perez Pellicer</p>
        </footer>

        <script>
            const username = document.getElementById("username");
            const password = document.getElementById("password");

            username.addEventListener("input", (event) => {
                if (username.value.length < 7) {
                    document.getElementById("errorMessage").textContent = "Username must be more then 6 characters";
                } else {
                    document.getElementById("errorMessage").textContent = "";
                }
            })
            password.addEventListener("input", (event) => {
                if (password.value.length < 7) {
                    document.getElementById("errorMessage").textContent = "Password must be more then 6 characters";
                } else {
                    document.getElementById("errorMessage").textContent = "";
                }
            })

            document.addEventListener("DOMContentLoaded", () => {
                if (username) {
                    username.focus();
                }
            })
        </script>
    </body>
</html>
