<html lang = "en">
    <!-- === Head Section ====  -->
    <head>
        <!-- === Include Special Character, Get out of ASCII default -->
        <meta charset="UTF-8">
        <!-- === Title ==== -->
        <title id="title">Request Access page</title>
        <meta name="description" content="This is the request access page for Project VI"/>
        <meta name="robots" content="index follow"/>   <!-- Want links to be indexed indexed-->
        <meta http-equiv="author" content="Emiliano Perez Pellicer"/> <!-- Want browser to reload this page every time -->
        <meta http-equiv="pragma" content="no-cache"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
   <link href="../css/request_access_style.css" type="text/css" rel="stylesheet"/>
    </head>
    <!-- ===Body Section ===  -->
    <body>
        <h1>Request Access</h1>
        <form action="php/request_access.php" method="post" id="access"> 
            <!-- === Primary Data fields === -->
            <fieldset>
                <p><label>First Name: <input type="text" name="firstname" placeholder="First Name" required/></label></p>
                <p><label>Last Name: <input type="text" name="lastname" placeholder="Last Name" required/></label></p>
                <p><label>Email: <input type="email" name="email" required/></label></p>
                <p><label>Website: <input type="url" name="url" required/></label></p>
                <p><label>Birthdate: <input type="date" name="birthday"required/></label></p>
                
                <!-- Buttons for student of professor -->
                <label><input type ="radio" name="prof_or_student" value="professor"/>Professor</label>
                <label><input type="radio" name="prof_or_student" value="student"/>Student</label>
            </fieldset>

            <!-- Add Separating Line  -->
            <br />
            <hr />
            
            <!-- ===Secondary Data fields === -->
            <fieldset>
                <legend>Additional Information</legend>
                <!-- Check Boxes  -->
                <p>Please Check all the boxes that apply</p>
                <label><input type="checkbox" name="involvement[]" value="none"/> I am not involved in Project VI</label><br/>
                <label><input type="checkbox" name="involvement[]" value="professor"/> I am at professor in Project VI</label><br/>
                <label><input type="checkbox" name="involvement[]" value="otherProfessor"/> I am a professor in another project/College</label><br/>
                <label><input type="checkbox" name="involvement[]" value="student"/> I am a student in Project VI</label><br/>
                <label><input type="checkbox" name="involvement[]" value="industry"/> I am a member of industry, interested in this project</label><br/>
                <label><input type="checkbox" name="involvement[]" value="none"/> None of the Above</label><br/>

                <!-- Drop Down List / 'Select Box' -->
                <p>Do you own a car?</p>
                <select name="drive_car">
                    <option value="no_answer" selected></option>
                    <option value="yes">Yes</option>
                    <option value="no">No</option>
                </select>

                <!-- Text Box -->
                <p>Please tell us about yourserlf</p>
                <textarea>About me...</textarea>
            </fieldset>

            <!-- =====Submit Button -->
            <input type="submit" value="Request access"/>
           
        </form>

        <!-- Go Back to Index -->
        <br />
        <p><a href="/ese_project_vi/index.html">Back to index</a></p>
        
        <footer>
            <!-- Add Copy Right  -->
            <p id = "copyright">Copyright &copy Emiliano Perez Pellicer</p>
        </footer>

    </body>
</html>
